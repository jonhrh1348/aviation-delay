name: Build and Deploy to Google Compute Engine

on:
  push:
    branches:
      - main

env:
  AE_API_KEY: '${{ secrets.AE_API_KEY }}'
  CLICKHOUSE_HOST: '${{ secrets.CLICKHOUSE_HOST }}'
  CLICKHOUSE_PW: '${{ secrets.CLICKHOUSE_PW }}'
  CLICKHOUSE_USER: '${{ secrets.CLICKHOUSE_USER }}'
  DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'
  DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
  GCP_INSTANCE_ID: '${{ secrets.GCP_INSTANCE_ID }}'
  GCP_PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  GCP_SA_KEY: '${{ secrets.GCP_SA_KEY }}'
  GCP_SSH_PRIVATE_KEY: '${{ secrets.GCP_SSH_PRIVATE_KEY }}'
  KAFKA_BOOTSTRAP_SERVERS: '${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}'
  WEATHER_API_KEY: '${{ secrets.WEATHER_API_KEY }}' 
  SAVE_TO_CLICKHOUSE: '${{ vars.SAVE_TO_CLICKHOUSE }}'
  DOCKER_REPOSITORY: '${{ vars.DOCKER_REPOSITORY }}'
  GAR_LOCATION: us-central1  
  SERVICE_NAME: aviation-delay-git
  GCE_INSTANCE_ZONE: us-central1-a
  IMAGE_NAME: aviation-delay

jobs:
  login:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using JSON Key
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ env.GCP_SA_KEY }}'

      # Set up Cloud SDK for gcloud commands
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      # Configure Docker to authenticate with Artifact Registry
      - name: Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      # Build the Docker image
      - name: Build Image
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest" .

      # Push the image to Artifact Registry
      - name: Push Image
        run: |-
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"

      # Deploy to GCE (Update existing container VM)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
